<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframes</title>
    <style>
        iframe {
            height: 550px;
            width: 550px;
            border-radius: 20px;
            border: 2px solid black;
            margin: 30px;
        }
    </style>
</head>

<body>
    <iframe
        src=" https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3805.3611124864005!2d78.39026507578072!3d17.490267099832135!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bcb9156f7afb389%3A0xdf398d9fcd887e85!2sLuLu%20Mall%20Hyderabad!5e0!3m2!1sen!2sin!4v1779874479974!5m2!1sen!2sin"
        style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

    <iframe  src="https://www.youtube.com/embed/l04dDYW-QaI?si=Pnp-bD2cdnAxmj33"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <iframe src="Html.pdf"></iframe>

</html>
