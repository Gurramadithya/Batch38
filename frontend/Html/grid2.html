<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid2</title>
    <style>
            .parent{
                display: grid;
                grid-template-columns: repeat(3,100px);
                justify-content: center;
                
            
            }
            .box-item{
                border: 1px solid black;
                height: 100px;
                background-color: skyblue;
                

            }
            body{
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: black;
                height: 100vh;
            }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box-item x1"></div>
        <div class="box-item x2"></div>
        <div class="box-item x3"></div>
        <div class="box-item x4"></div>
        <div class="box-item x5"></div>
        <div class="box-item x6"></div>
        <div class="box-item x7"></div>
        <div class="box-item x8"></div>
        <div class="box-item x9"></div>
    </div>
</body>
</html>
