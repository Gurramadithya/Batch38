<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            display: flex;
            
        
            height: 100vh;
            flex-direction: column;
            border: 2px solid red;

        }

        img {
            height: 100px;
            width: 100px;
        }
        .first{
            display: flex;
            justify-content: space-between;
          
            height: 40%;
        }
        .second{
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40%;
        }
        .third{
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50%;
        }
    </style>
</head>

<body>
    <div class="parent">

        <div class="first">
            <img src="ajio.png" alt="image">
            <img src="ajio.png" alt="image">
            <img src="ajio.png" alt="image">
        </div>

        <div class="second">
            <img src="ajio.png" alt="image">
            <img src="ajio.png" alt="image">
            <img src="ajio.png" alt="" image>
        </div>

        <div class="third">
            <img src="ajio.png" alt="image">
            <img src="ajio.png" alt="image">
            <img src="ajio.png" alt="image">
        </div>

    </div>
</body>

</html>
