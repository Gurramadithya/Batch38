<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fieldset</title>
    <style>
        fieldset {
            display: flex;
            justify-content: center;
            width: 30%;
            border-radius: 20px;
            background: linear-gradient(45deg, red, green);
            color: whitesmoke;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        legend {
            background: linear-gradient(45deg, red, green);
            color: whitesmoke;
            border-radius: 10px;
            padding: 10px;
        }

        body {
            display: flex;
            justify-content: center;
            margin-top: 400px;
        }

        p {
            text-align: justify;
        }
    </style>
</head>

<body>
    <fieldset>
        <legend>
            CAREER IT
        </legend>
        <p>
            Career IT is a software training institute located in KPHB, Hyderabad, near JNTU/Kukatpally area. They
            mainly focus on IT and software courses for students, job seekers, and working professionals.
        </p>
    </fieldset>
</body>

</html>
