<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        .black {
            background-color: black;
            color: white;
            text-align: end;
        }

        .lightgrey {
            background-color: lightgrey;
        }

        .orange {
            background-color: rgb(216, 88, 9);
        }

        .beige {
            background-color: whitesmoke;
        }

        table {
            border-radius: 20px;
        }

        table,
        tr,
        th,
        td {
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <table border="1" cellpadding="20px">

        <tr>
            <th colspan="4" class="black">0</th>
        </tr>

        <tr>
            <td class="lightgrey">+</td>
            <td class="lightgrey">-</td>
            <td class="lightgrey">x</td>
            <td class="lightgrey">/</td>
        </tr>

        <tr>
            <td class="beige">7</td>
            <td class="beige">8</td>
            <td class="beige">9</td>
            <td rowspan="4" class="orange">=</td>
        </tr>

        <tr>
            <td class="beige">4</td>
            <td class="beige">5</td>
            <td class="beige">6</td>
        </tr>

        <tr>
            <td class="beige">3</td>
            <td class="beige">2</td>
            <td class="beige">1</td>
        </tr>

        <tr>
            <td class="beige">0</td>
            <td class="beige">.</td>
            <td class="beige">AC</td>
        </tr>

    </table>

</body>

</html>
