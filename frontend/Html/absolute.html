<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute</title>
    <style>
        .common{
            height: 100px;
            width: 100px;
            border: 2px solid white;
        }
        .c1{
            background-color: brown;
            
        }
        .c2{
            background-color: red;
             position: absolute;
            left: 20px;
            top: 80px;
        }
        .c3{
            background-color: blue;
            position: absolute;
            left: 40px;
            top: 160px;
        }
        .c4{
            background-color: blueviolet;
             position: absolute;
            left: 60px;
            top: 240px;
        }
        .c5{
            background-color: cadetblue;
             position: absolute;
            left: 80px;
            top:300px;
        }
    </style>
</head>
<body>
    <div class="common c1">div1</div>
    <div class="common c2">div2</div>
    <div class="common c3">div3</div>
    <div class="common c4">div4</div>
    <div class="common c5">div5</div>
</body>
</html>
