<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid5</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .parent{
            display: grid;
            grid-template-rows: 20% 20% 20% 20% 20% ;
            grid-template-columns: 20% 60% 20%;
            height: 100vh;
            text-align: center;
        }
        
        .x1{
            background-color: palevioletred;
            grid-column: 1/4;
        }
        .x2{
            background-color: plum;
            grid-column: 1/2;
        }
        .x3{
            background-color: rgb(236, 215, 32);
            grid-column: 2/3;
            grid-row: 2/4;
        }
        .x4{
            background-color: plum;
        }
        .x5{
            background-color: palevioletred;
            grid-row: 3/5;
        }
        .x6{
            background-color: skyblue;
        }
        .x7{
            background-color: orange;
            grid-column: 2/4;
        }
        .x8{
            background-color: navy;
            grid-column: 1/3;
        }
        .x9{
            background-color: rgb(236, 220, 75);
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="item x1">1</div>
        <div class="item x2">2</div>
        <div class="item x3">3</div>
        <div class="item x4">4</div>
        <div class="item x5">5</div>
        <div class="item x6">6</div>
        <div class="item x7">7</div>
        <div class="item x8">8</div>
        <div class="item x9">9</div>
    </div>
</body>
</html>
