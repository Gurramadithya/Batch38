    <title>loops</title>

<body>
    <script>

        var i = 1;

        while (i <= 10) {
            var j = i ;

            while (j <= 10) {
                var k = j ;

                while (k <= 10) {
                        if (i + j + k== 10) {
                            console.log(i, j, k,)
        
                    }
                    k++;
                }
                j++;
            }
            i++;
        }


        var i=1;

        while(i<10){
            var j=10;

            while(j>0){
                if(i+j==10){
                    console.log(i,j);
                }
                j--;
            }

            i++;

        }


        var i = 0;
        var j = 1;

        while (i < 20) {
            console.log(i);
            var next = i + j;
            i = j;
            j = next;

        }



        

    </script>
